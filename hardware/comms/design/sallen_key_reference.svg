<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace" font-size="14">
  <style>
    .wire { stroke: #222; stroke-width: 2; fill: none; }
    .comp { stroke: #333; stroke-width: 2; fill: none; }
    .label { font-size: 13px; fill: #333; }
    .pin { font-size: 12px; fill: #c00; font-weight: bold; }
    .note { font-size: 11px; fill: #06a; }
    .dot { fill: #222; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Sallen-Key LPF — MCP6022 Section A (Corrected)</text>

  <!-- Input label -->
  <text x="30" y="155" class="label" font-weight="bold">BASE_OUT</text>
  <text x="30" y="170" class="label" font-weight="bold">_TO_LPF</text>

  <!-- Input wire -->
  <line x1="110" y1="160" x2="140" y2="160" class="wire"/>

  <!-- R1 resistor -->
  <rect x="140" y="150" width="80" height="20" class="comp" rx="2"/>
  <text x="180" y="145" text-anchor="middle" class="label">R1</text>
  <text x="180" y="185" text-anchor="middle" class="note">22 kΩ</text>

  <!-- Wire from R1 to junction A -->
  <line x1="220" y1="160" x2="280" y2="160" class="wire"/>

  <!-- Junction A dot -->
  <circle cx="280" cy="160" r="4" class="dot"/>

  <!-- R2 resistor -->
  <rect x="310" y="150" width="80" height="20" class="comp" rx="2"/>
  <text x="350" y="145" text-anchor="middle" class="label">R2</text>
  <text x="350" y="185" text-anchor="middle" class="note">22 kΩ</text>

  <!-- Wire from R2 to junction B -->
  <line x1="280" y1="160" x2="310" y2="160" class="wire"/>
  <line x1="390" y1="160" x2="440" y2="160" class="wire"/>

  <!-- Junction B dot -->
  <circle cx="440" cy="160" r="4" class="dot"/>

  <!-- Wire from junction B to op-amp IN+ -->
  <line x1="440" y1="160" x2="490" y2="160" class="wire"/>

  <!-- C1 from junction A down to GND -->
  <line x1="280" y1="160" x2="280" y2="210" class="wire"/>
  <!-- C1 cap symbol -->
  <line x1="265" y1="210" x2="295" y2="210" class="wire" stroke-width="3"/>
  <line x1="265" y1="218" x2="295" y2="218" class="wire" stroke-width="3"/>
  <line x1="280" y1="218" x2="280" y2="260" class="wire"/>
  <text x="300" y="220" class="label">C1</text>
  <text x="300" y="235" class="note">2.2 nF</text>
  <!-- GND symbol -->
  <line x1="268" y1="260" x2="292" y2="260" class="wire" stroke-width="2"/>
  <line x1="272" y1="266" x2="288" y2="266" class="wire" stroke-width="2"/>
  <line x1="276" y1="272" x2="284" y2="272" class="wire" stroke-width="2"/>
  <text x="280" y="290" text-anchor="middle" class="label">GND</text>

  <!-- C2 from junction B down to op-amp output (NOT GND!) -->
  <line x1="440" y1="160" x2="440" y2="210" class="wire"/>
  <!-- C2 cap symbol -->
  <line x1="425" y1="210" x2="455" y2="210" class="wire" stroke-width="3"/>
  <line x1="425" y1="218" x2="455" y2="218" class="wire" stroke-width="3"/>
  <line x1="440" y1="218" x2="440" y2="290" class="wire"/>
  <text x="460" y="220" class="label">C2</text>
  <text x="460" y="235" class="note">2.2 nF</text>

  <!-- C2 connects to output wire (feedback) -->
  <line x1="440" y1="290" x2="640" y2="290" class="wire"/>

  <!-- Big red annotation for C2 feedback -->
  <text x="500" y="315" font-size="13" fill="#c00" font-weight="bold">↑ C2 goes to OUTPUT</text>
  <text x="500" y="332" font-size="13" fill="#c00" font-weight="bold">   NOT to GND!</text>

  <!-- Op-amp triangle -->
  <polygon points="490,130 490,210 580,170" class="comp" fill="#ffe"/>
  <!-- +/- labels -->
  <text x="497" y="158" class="pin">+</text>
  <text x="497" y="198" class="pin">−</text>
  <!-- Pin numbers -->
  <text x="475" y="158" class="pin">3</text>
  <text x="475" y="198" class="pin">2</text>
  <text x="585" y="168" class="pin">1</text>

  <!-- Op-amp labels -->
  <text x="520" y="178" font-size="11" fill="#555">U7A</text>

  <!-- IN- (pin 2) wire goes left then down then right to output -->
  <line x1="490" y1="190" x2="470" y2="190" class="wire"/>
  <line x1="470" y1="190" x2="470" y2="240" class="wire"/>
  <line x1="470" y1="240" x2="640" y2="240" class="wire"/>

  <!-- Junction at pin 2 feedback -->
  <circle cx="640" cy="240" r="4" class="dot"/>

  <!-- Output wire from op-amp -->
  <line x1="580" y1="170" x2="640" y2="170" class="wire"/>

  <!-- Output goes down to feedback junction -->
  <line x1="640" y1="170" x2="640" y2="290" class="wire"/>

  <!-- Junction at output/feedback point -->
  <circle cx="640" cy="240" r="4" class="dot"/>
  <circle cx="640" cy="290" r="4" class="dot"/>
  <circle cx="640" cy="170" r="4" class="dot"/>

  <!-- Output continues right -->
  <line x1="640" y1="170" x2="700" y2="170" class="wire"/>

  <!-- Output label -->
  <text x="705" y="165" class="label" font-weight="bold">To 100nF</text>
  <text x="705" y="180" class="label" font-weight="bold">→ U7B</text>

  <!-- Annotations -->
  <text x="600" y="235" class="note">pin 2 → pin 1</text>
  <text x="600" y="248" class="note">(unity gain)</text>

  <!-- Power pins note -->
  <text x="490" y="120" class="note">pin 8: +3V3 (bypass 100nF)</text>
  <text x="490" y="108" class="note">pin 4: GND</text>

  <!-- Legend box -->
  <rect x="20" y="340" width="760" height="45" rx="5" fill="#f5f5f5" stroke="#ccc"/>
  <text x="40" y="362" font-size="12" fill="#333">KEY DIFFERENCE: C2 feeds back to pin 1 (OUT), not to GND. This feedback is what makes it a Sallen-Key filter.</text>
  <text x="40" y="378" font-size="12" fill="#333">Pin 2 (IN−) wires directly to pin 1 (OUT) for unity gain. Output goes to AC coupling cap → U7B gain stage.</text>
</svg>
